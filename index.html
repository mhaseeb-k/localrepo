<!-- paragraph -->
<p>This is a simple HTML file to demonstrate my first commit. (button example)</p>
<!-- a button to change above text to my name  -->
<button onclick="changeText()">Click me to change the text</button>

<!-- script to change the text -->
<script>
function changeText() {
    document.querySelector('p').textContent = 'My name is Haseeb Khan';
}
</script>

<!-- Adding style to this button -->
<style>
button {
    background-color: #d8582d; /* Green */
    border: none;
    color: white;
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
}
